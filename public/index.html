<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SnapQuest - Réseau Social</title>
    <script>
        tailwind = {
            config: { darkMode: 'class' }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Space Grotesk', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 10px; }
        
        /* Animation du logo */
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .logo-animate { animation: logoPulse 2s ease-in-out infinite; }
        
        /* Bottom navigation pour mobile */
        @media (max-width: 768px) {
            .bottom-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: rgba(15, 23, 42, 0.95);
                backdrop-filter: blur(12px);
                border-top: 1px solid rgba(51, 65, 85, 0.5);
                padding: 0.75rem 1rem;
                z-index: 100;
            }
            .main-content { padding-bottom: 80px; }
            .desktop-nav { display: none !important; }
        }
        @media (min-width: 769px) {
            .bottom-nav { display: none !important; }
            .desktop-nav { display: flex !important; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 transition-colors duration-300">
    <div id="root"></div>
    <script>
        const App = () => {
            const [user, setUser] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [isLogin, setIsLogin] = React.useState(true);
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [fullName, setFullName] = React.useState('');
            const [error, setError] = React.useState('');
            const [sending, setSending] = React.useState(false);
            
            const [photos, setPhotos] = React.useState([]);
            const [selectedFile, setSelectedFile] = React.useState(null);
            const [caption, setCaption] = React.useState('');
            const [preview, setPreview] = React.useState(null);
            const [uploading, setUploading] = React.useState(false);
            const [activeTab, setActiveTab] = React.useState('gallery');
            const [loadingPhotos, setLoadingPhotos] = React.useState(false);
            const [commentInputs, setCommentInputs] = React.useState({});
            
            // Messagerie
            const [messages, setMessages] = React.useState([]);
            const [newMessage, setNewMessage] = React.useState('');
            const messagesEndRef = React.useRef(null);

            // Audio
            const [audios, setAudios] = React.useState([]);
            const [audioFile, setAudioFile] = React.useState(null);
            const [audioTitle, setAudioTitle] = React.useState('');
            const [audioArtist, setAudioArtist] = React.useState('');
            const [uploadingAudio, setUploadingAudio] = React.useState(false);
            const [currentPlaying, setCurrentPlaying] = React.useState(null);
            const audioRef = React.useRef(null);

            // Notifications
            const [notifications, setNotifications] = React.useState({
                gallery: 0,
                chat: 0,
                audio: 0
            });
            const [lastPhotoCount, setLastPhotoCount] = React.useState(0);
            const [lastMessageCount, setLastMessageCount] = React.useState(0);
            const [lastAudioCount, setLastAudioCount] = React.useState(0);

            // Profil Edition
            const [editUsername, setEditUsername] = React.useState('');
            const [editFullName, setEditFullName] = React.useState('');
            const [profilePicFile, setProfilePicFile] = React.useState(null);
            const [profilePicPreview, setProfilePicPreview] = React.useState(null);
            
            // Mode Sombre (forcé à true)
            const [darkMode] = React.useState(true);

            React.useEffect(() => {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }, []);

            React.useEffect(() => {
                fetch('/api/me', { credentials: 'include' })
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.id) {
                            setUser(data);
                            setEditUsername(data.username);
                            setEditFullName(data.full_name);
                            fetchPhotos();
                            fetchAudios();
                        }
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);
            
            React.useEffect(() => {
                let interval;
                if (activeTab === 'chat' && user) {
                    fetchMessages();
                    interval = setInterval(fetchMessages, 3000);
                }
                return () => clearInterval(interval);
            }, [activeTab, user]);

            React.useEffect(() => {
                if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            // Vérification des nouvelles notifications
            React.useEffect(() => {
                if (photos.length > lastPhotoCount && lastPhotoCount !== 0) {
                    setNotifications(prev => ({ ...prev, gallery: prev.gallery + (photos.length - lastPhotoCount) }));
                }
                setLastPhotoCount(photos.length);
            }, [photos]);

            React.useEffect(() => {
                if (messages.length > lastMessageCount && lastMessageCount !== 0) {
                    setNotifications(prev => ({ ...prev, chat: prev.chat + (messages.length - lastMessageCount) }));
                }
                setLastMessageCount(messages.length);
            }, [messages]);

            React.useEffect(() => {
                if (audios.length > lastAudioCount && lastAudioCount !== 0) {
                    setNotifications(prev => ({ ...prev, audio: prev.audio + (audios.length - lastAudioCount) }));
                }
                setLastAudioCount(audios.length);
            }, [audios]);
            
            const fetchPhotos = async () => {
                setLoadingPhotos(true);
                try {
                    const res = await fetch('/api/photos', { credentials: 'include' });
                    if (res.status === 401) { setUser(null); return; }
                    const data = await res.json();
                    setPhotos(data || []);
                } catch(e) { console.error(e); }
                finally { setLoadingPhotos(false); }
            };

            const fetchMessages = async () => {
                try {
                    const res = await fetch('/api/messages', { credentials: 'include' });
                    if (res.status === 401) return;
                    const data = await res.json();
                    setMessages(data || []);
                } catch(e) { console.error(e); }
            };

            const fetchAudios = async () => {
                try {
                    const res = await fetch('/api/audios', { credentials: 'include' });
                    if (res.status === 401) return;
                    const data = await res.json();
                    setAudios(data || []);
                } catch(e) { console.error(e); }
            };
            
            const handleRegister = async () => {
                if (!username || !password) return;
                setSending(true); setError('');
                try {
                    const res = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password, full_name: fullName || username }),
                        credentials: 'include'
                    });
                    const data = await res.json();
                    if (data.user) {
                        setUser(data.user);
                        setEditUsername(data.user.username);
                        setEditFullName(data.user.full_name);
                        fetchPhotos();
                        fetchAudios();
                    } else { setError(data.error || 'Erreur'); }
                } catch(e) { setError('Erreur reseau'); }
                finally { setSending(false); }
            };
            
            const handleLogin = async () => {
                if (!username || !password) return;
                setSending(true); setError('');
                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password }),
                        credentials: 'include'
                    });
                    const data = await res.json();
                    if (data.user) {
                        setUser(data.user);
                        setEditUsername(data.user.username);
                        setEditFullName(data.user.full_name);
                        fetchPhotos();
                        fetchAudios();
                    } else { setError(data.error || 'Identifiants invalides'); }
                } catch(e) { setError('Erreur reseau'); }
                finally { setSending(false); }
            };
            
            const logout = async () => {
                await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
                setUser(null); setPhotos([]); setMessages([]); setAudios([]); setActiveTab('gallery');
            };

            const handleUpdateProfile = async () => {
                if (!editUsername) return;
                setSending(true);
                const formData = new FormData();
                formData.append('username', editUsername);
                formData.append('full_name', editFullName);
                if (profilePicFile) formData.append('file', profilePicFile);

                try {
                    const res = await fetch('/api/me/update', { method: 'POST', body: formData, credentials: 'include' });
                    const data = await res.json();
                    if (data.user) {
                        setUser(data.user);
                        setProfilePicFile(null);
                        setProfilePicPreview(null);
                        fetchPhotos(); 
                        fetchMessages();
                        fetchAudios();
                    } else {
                        alert(data.error || 'Erreur lors de la mise a jour');
                    }
                } catch(e) { alert('Erreur reseau'); }
                finally { setSending(false); }
            };

            const handleProfilePicChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setProfilePicFile(file);
                    const reader = new FileReader();
                    reader.onloadend = () => setProfilePicPreview(reader.result);
                    reader.readAsDataURL(file);
                }
            };
            
            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setSelectedFile(file);
                    const reader = new FileReader();
                    reader.onloadend = () => setPreview(reader.result);
                    reader.readAsDataURL(file);
                }
            };
            
            const handleUpload = async () => {
                if (!selectedFile) return;
                setUploading(true);
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('caption', caption);
                try {
                    const res = await fetch('/api/photos', { method: 'POST', body: formData, credentials: 'include' });
                    if (res.status === 401) return;
                    const data = await res.json();
                    if (data.id) {
                        setSelectedFile(null); setPreview(null); setCaption('');
                        fetchPhotos(); setActiveTab('gallery');
                        setNotifications(prev => ({ ...prev, gallery: 0 }));
                    }
                } catch(e) { alert('Erreur reseau'); }
                finally { setUploading(false); }
            };

            const handleAudioUpload = async () => {
                if (!audioFile) return;
                setUploadingAudio(true);
                const formData = new FormData();
                formData.append('audio', audioFile);
                formData.append('title', audioTitle);
                formData.append('artist', audioArtist);
                try {
                    const res = await fetch('/api/audios', { method: 'POST', body: formData, credentials: 'include' });
                    const data = await res.json();
                    if (data.id) {
                        setAudioFile(null);
                        setAudioTitle('');
                        setAudioArtist('');
                        fetchAudios();
                        setNotifications(prev => ({ ...prev, audio: 0 }));
                    }
                } catch(e) { alert('Erreur reseau'); }
                finally { setUploadingAudio(false); }
            };
            
            const deletePhoto = async (id) => {
                if (!confirm('Supprimer definitivement cette photo ?')) return;
                await fetch('/api/photos/' + id, { method: 'DELETE', credentials: 'include' });
                fetchPhotos();
            };

            const deleteAudio = async (id) => {
                if (!confirm('Supprimer ce morceau ?')) return;
                await fetch('/api/audios/' + id, { method: 'DELETE', credentials: 'include' });
                fetchAudios();
                if (currentPlaying === id) {
                    if (audioRef.current) audioRef.current.pause();
                    setCurrentPlaying(null);
                }
            };
            
            const toggleLike = async (id) => {
                setPhotos(photos.map(p => {
                    if (p.id === id) {
                        return { ...p, isLikedByMe: !p.isLikedByMe, likesCount: p.isLikedByMe ? p.likesCount - 1 : p.likesCount + 1 };
                    }
                    return p;
                }));
                await fetch('/api/photos/' + id + '/like', { method: 'POST', credentials: 'include' });
            };
            
            const submitComment = async (photoId) => {
                const text = commentInputs[photoId];
                if (!text || text.trim() === '') return;
                await fetch('/api/photos/' + photoId + '/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text }),
                    credentials: 'include'
                });
                setCommentInputs({ ...commentInputs, [photoId]: '' });
                fetchPhotos();
            };

            const sendChatMessage = async () => {
                if (!newMessage || newMessage.trim() === '') return;
                const tempMsg = newMessage;
                setNewMessage('');
                await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: tempMsg }),
                    credentials: 'include'
                });
                fetchMessages();
                setNotifications(prev => ({ ...prev, chat: 0 }));
            };

            const playAudio = (id, url) => {
                if (currentPlaying === id) {
                    if (audioRef.current) {
                        audioRef.current.pause();
                        setCurrentPlaying(null);
                    }
                } else {
                    if (audioRef.current) {
                        audioRef.current.src = url;
                        audioRef.current.play();
                        setCurrentPlaying(id);
                    }
                }
            };

            const renderAvatar = (url, name, sizeClass = 'w-10 h-10', textSize = 'text-base') => {
                if (url && url !== '') {
                    return React.createElement('img', { src: url, className: `${sizeClass} rounded-full object-cover shadow-inner bg-slate-700` });
                }
                return React.createElement('div', { className: `${sizeClass} rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 flex items-center justify-center text-white font-extrabold ${textSize} shadow-inner` },
                    (name || 'A')[0].toUpperCase()
                );
            };

            const NavIcon = ({ tab, icon, label, notifCount }) => {
                const isActive = activeTab === tab;
                return React.createElement('button', {
                    onClick: () => {
                        setActiveTab(tab);
                        if (notifCount > 0) setNotifications(prev => ({ ...prev, [tab]: 0 }));
                    },
                    className: `relative flex flex-col items-center gap-1 p-2 rounded-xl transition-all ${isActive ? 'text-purple-400 bg-purple-500/10' : 'text-slate-400 hover:text-slate-300 hover:bg-slate-800'}`
                },
                    React.createElement('div', { className: 'relative' },
                        React.createElement('svg', { className: 'w-6 h-6', fill: isActive ? 'currentColor' : 'none', stroke: 'currentColor', viewBox: '0 0 24 24' }, icon),
                        notifCount > 0 && React.createElement('span', { className: 'absolute -top-1 -right-2 bg-red-500 text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center shadow-lg' }, notifCount > 9 ? '9+' : notifCount)
                    ),
                    React.createElement('span', { className: 'text-[10px] font-medium' }, label)
                );
            };
            
            if (loading) {
                return React.createElement('div', { className: 'min-h-screen flex items-center justify-center bg-slate-950' },
                    React.createElement('div', { className: 'w-10 h-10 border-4 border-purple-500/30 border-t-purple-500 rounded-full animate-spin' })
                );
            }
            
            // --- ECRAN DE CONNEXION AVEC FOOTER ---
            if (!user) {
                return React.createElement('div', { className: 'min-h-screen flex flex-col justify-between bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900' },
                    React.createElement('div', { className: 'flex-1 flex items-center justify-center p-4' },
                        React.createElement('div', { className: 'max-w-md w-full bg-slate-800/50 backdrop-blur-sm rounded-3xl shadow-2xl p-8 border border-slate-700' },
                            React.createElement('div', { className: 'text-center mb-8' },
                                React.createElement('div', { className: 'logo-animate w-20 h-20 rounded-2xl bg-gradient-to-tr from-purple-500 via-indigo-500 to-pink-500 flex items-center justify-center mx-auto mb-4 shadow-xl' },
                                    React.createElement('svg', { className: 'w-10 h-10 text-white', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                        React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z' }),
                                        React.createElement('circle', { cx: '12', cy: '13', r: '3' })
                                    )
                                ),
                                React.createElement('h1', { className: 'text-3xl font-extrabold bg-gradient-to-r from-purple-400 to-indigo-400 bg-clip-text text-transparent' }, 'SnapQuest'),
                                React.createElement('p', { className: 'text-slate-400 font-medium mt-1' }, isLogin ? 'Ravi de te revoir !' : 'Rejoins la communaute')
                            ),
                            React.createElement('div', { className: 'space-y-4' },
                                React.createElement('input', { type: 'text', placeholder: "Nom d'utilisateur", value: username, onChange: (e) => setUsername(e.target.value), className: 'w-full px-4 py-3 bg-slate-700/50 text-white border border-slate-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all placeholder-slate-400' }),
                                React.createElement('input', { type: 'password', placeholder: 'Mot de passe', value: password, onChange: (e) => setPassword(e.target.value), className: 'w-full px-4 py-3 bg-slate-700/50 text-white border border-slate-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all placeholder-slate-400' }),
                                !isLogin && React.createElement('input', { type: 'text', placeholder: 'Nom complet (optionnel)', value: fullName, onChange: (e) => setFullName(e.target.value), className: 'w-full px-4 py-3 bg-slate-700/50 text-white border border-slate-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all placeholder-slate-400' }),
                                React.createElement('button', { onClick: isLogin ? handleLogin : handleRegister, disabled: !username || !password || sending, className: `w-full py-3.5 rounded-xl font-bold transition-all shadow-lg ${!username || !password || sending ? 'bg-slate-700 text-slate-500 cursor-not-allowed' : 'bg-gradient-to-r from-purple-600 to-indigo-600 text-white hover:opacity-90'}` }, sending ? 'Chargement...' : (isLogin ? 'Se connecter' : 'Creer mon compte')),
                                React.createElement('button', { onClick: () => { setIsLogin(!isLogin); setError(''); setUsername(''); setPassword(''); }, className: 'w-full text-sm font-semibold text-purple-400 hover:text-purple-300 transition-colors' }, isLogin ? "Pas encore de compte ? S'inscrire" : 'Deja inscrit ? Se connecter'),
                                error && React.createElement('p', { className: 'text-red-400 text-sm text-center font-medium bg-red-500/10 p-2 rounded-lg' }, error)
                            )
                        )
                    ),
                    React.createElement('footer', { className: 'text-center py-6 border-t border-slate-800 bg-slate-900/50' },
                        React.createElement('p', { className: 'text-slate-500 text-sm' }, '© 2026 SnapQuest - Made By DarkMods'),
                        React.createElement('p', { className: 'text-slate-600 text-xs mt-1' }, 'Powered By DarkMods')
                    )
                );
            }
            
            // --- APPLICATION PRINCIPALE ---
            return React.createElement('div', { className: 'min-h-screen flex flex-col bg-slate-950' },
                React.createElement('audio', { ref: audioRef, className: 'hidden' }),
                
                // Header Desktop
                React.createElement('header', { className: 'desktop-nav sticky top-0 z-50 bg-slate-900/90 backdrop-blur-lg border-b border-slate-800' },
                    React.createElement('div', { className: 'max-w-6xl mx-auto px-4 h-16 flex items-center justify-between' },
                        React.createElement('div', { className: 'flex items-center gap-3 cursor-pointer group', onClick: () => setActiveTab('gallery') },
                            React.createElement('div', { className: 'logo-animate w-10 h-10 rounded-xl bg-gradient-to-tr from-purple-500 via-indigo-500 to-pink-500 flex items-center justify-center shadow-lg group-hover:shadow-purple-500/25 transition-all' },
                                React.createElement('svg', { className: 'w-6 h-6 text-white', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                    React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z' })
                                )
                            ),
                            React.createElement('span', { className: 'font-extrabold text-xl tracking-tight bg-gradient-to-r from-purple-400 to-indigo-400 bg-clip-text text-transparent' }, 'SnapQuest')
                        ),
                        
                        // Navigation Desktop
                        React.createElement('div', { className: 'flex items-center gap-1' },
                            ['gallery', 'upload', 'chat', 'audio', 'profile'].map(tab => {
                                const icons = {
                                    gallery: React.createElement(React.Fragment, null,
                                        React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z' })
                                    ),
                                    upload: React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M12 4v16m8-8H4' }),
                                    chat: React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z' }),
                                    audio: React.createElement(React.Fragment, null,
                                        React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3' })
                                    ),
                                    profile: React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z' })
                                };
                                const labels = { gallery: 'Actu', upload: 'Poster', chat: 'Chat', audio: 'Musique', profile: 'Profil' };
                                const notifCount = notifications[tab] || 0;
                                const isActive = activeTab === tab;
                                return React.createElement('button', {
                                    key: tab,
                                    onClick: () => { setActiveTab(tab); if (notifCount > 0) setNotifications(prev => ({ ...prev, [tab]: 0 })); },
                                    className: `relative flex items-center gap-2 px-4 py-2 rounded-xl transition-all ${isActive ? 'bg-purple-500/20 text-purple-400' : 'text-slate-400 hover:text-slate-300 hover:bg-slate-800'}`
                                },
                                    React.createElement('div', { className: 'relative' },
                                        React.createElement('svg', { className: 'w-5 h-5', fill: isActive ? 'currentColor' : 'none', stroke: 'currentColor', viewBox: '0 0 24 24' }, icons[tab]),
