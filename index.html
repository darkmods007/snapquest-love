<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SnapQuest - Réseau Social</title>
    <script>
        tailwind = {
            config: { darkMode: 'class' }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #94a3b8; border-radius: 10px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background-color: #475569; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 transition-colors duration-300">
    <div id="root"></div>
    <script>
        const App = () => {
            const [user, setUser] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [isLogin, setIsLogin] = React.useState(true);
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [fullName, setFullName] = React.useState('');
            const [error, setError] = React.useState('');
            const [sending, setSending] = React.useState(false);
            
            const [photos, setPhotos] = React.useState([]);
            const [selectedFile, setSelectedFile] = React.useState(null);
            const [caption, setCaption] = React.useState('');
            const [preview, setPreview] = React.useState(null);
            const [uploading, setUploading] = React.useState(false);
            const [activeTab, setActiveTab] = React.useState('gallery');
            const [loadingPhotos, setLoadingPhotos] = React.useState(false);
            const [commentInputs, setCommentInputs] = React.useState({});
            
            // Messagerie
            const [messages, setMessages] = React.useState([]);
            const [newMessage, setNewMessage] = React.useState('');
            const messagesEndRef = React.useRef(null);

            // Profil Edition
            const [editUsername, setEditUsername] = React.useState('');
            const [editFullName, setEditFullName] = React.useState('');
            const [profilePicFile, setProfilePicFile] = React.useState(null);
            const [profilePicPreview, setProfilePicPreview] = React.useState(null);
            
            // Mode Sombre
            const [darkMode, setDarkMode] = React.useState(() => {
                return localStorage.getItem('theme') === 'dark' || 
                    (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
            });

            React.useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }, [darkMode]);

            React.useEffect(() => {
                fetch('/api/me', { credentials: 'include' })
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.id) {
                            setUser(data);
                            setEditUsername(data.username);
                            setEditFullName(data.full_name);
                            fetchPhotos();
                        }
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);
            
            React.useEffect(() => {
                let interval;
                if (activeTab === 'chat' && user) {
                    fetchMessages();
                    interval = setInterval(fetchMessages, 3000);
                }
                return () => clearInterval(interval);
            }, [activeTab, user]);

            React.useEffect(() => {
                if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);
            
            const fetchPhotos = async () => {
                setLoadingPhotos(true);
                try {
                    const res = await fetch('/api/photos', { credentials: 'include' });
                    if (res.status === 401) { setUser(null); return; }
                    const data = await res.json();
                    setPhotos(data || []);
                } catch(e) { console.error(e); }
                finally { setLoadingPhotos(false); }
            };

            const fetchMessages = async () => {
                try {
                    const res = await fetch('/api/messages', { credentials: 'include' });
                    if (res.status === 401) return;
                    const data = await res.json();
                    setMessages(data || []);
                } catch(e) { console.error(e); }
            };
            
            const handleRegister = async () => {
                if (!username || !password) return;
                setSending(true); setError('');
                try {
                    const res = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password, full_name: fullName || username }),
                        credentials: 'include'
                    });
                    const data = await res.json();
                    if (data.user) {
                        setUser(data.user);
                        setEditUsername(data.user.username);
                        setEditFullName(data.user.full_name);
                        fetchPhotos();
                    } else { setError(data.error || 'Erreur'); }
                } catch(e) { setError('Erreur réseau'); }
                finally { setSending(false); }
            };
            
            const handleLogin = async () => {
                if (!username || !password) return;
                setSending(true); setError('');
                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password }),
                        credentials: 'include'
                    });
                    const data = await res.json();
                    if (data.user) {
                        setUser(data.user);
                        setEditUsername(data.user.username);
                        setEditFullName(data.user.full_name);
                        fetchPhotos();
                    } else { setError(data.error || 'Identifiants invalides'); }
                } catch(e) { setError('Erreur réseau'); }
                finally { setSending(false); }
            };
            
            const logout = async () => {
                await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
                setUser(null); setPhotos([]); setMessages([]); setActiveTab('gallery');
            };

            const handleUpdateProfile = async () => {
                if (!editUsername) return;
                setSending(true);
                const formData = new FormData();
                formData.append('username', editUsername);
                formData.append('full_name', editFullName);
                if (profilePicFile) formData.append('file', profilePicFile);

                try {
                    const res = await fetch('/api/me/update', { method: 'POST', body: formData, credentials: 'include' });
                    const data = await res.json();
                    if (data.user) {
                        setUser(data.user);
                        setProfilePicFile(null);
                        setProfilePicPreview(null);
                        alert('Profil mis à jour avec succès !');
                        fetchPhotos(); 
                        fetchMessages();
                    } else {
                        alert(data.error || 'Erreur lors de la mise à jour');
                    }
                } catch(e) { alert('Erreur réseau'); }
                finally { setSending(false); }
            };

            const handleProfilePicChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setProfilePicFile(file);
                    const reader = new FileReader();
                    reader.onloadend = () => setProfilePicPreview(reader.result);
                    reader.readAsDataURL(file);
                }
            };
            
            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setSelectedFile(file);
                    const reader = new FileReader();
                    reader.onloadend = () => setPreview(reader.result);
                    reader.readAsDataURL(file);
                }
            };
            
            const handleUpload = async () => {
                if (!selectedFile) return;
                setUploading(true);
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('caption', caption);
                try {
                    const res = await fetch('/api/photos', { method: 'POST', body: formData, credentials: 'include' });
                    if (res.status === 401) return;
                    const data = await res.json();
                    if (data.id) {
                        setSelectedFile(null); setPreview(null); setCaption('');
                        fetchPhotos(); setActiveTab('gallery');
                    }
                } catch(e) { alert('Erreur réseau'); }
                finally { setUploading(false); }
            };
            
            const deletePhoto = async (id) => {
                if (!confirm('Supprimer définitivement cette photo ?')) return;
                await fetch('/api/photos/' + id, { method: 'DELETE', credentials: 'include' });
                fetchPhotos();
            };
            
            const toggleLike = async (id) => {
                setPhotos(photos.map(p => {
                    if (p.id === id) {
                        return { ...p, isLikedByMe: !p.isLikedByMe, likesCount: p.isLikedByMe ? p.likesCount - 1 : p.likesCount + 1 };
                    }
                    return p;
                }));
                await fetch('/api/photos/' + id + '/like', { method: 'POST', credentials: 'include' });
            };
            
            const submitComment = async (photoId) => {
                const text = commentInputs[photoId];
                if (!text || text.trim() === '') return;
                await fetch('/api/photos/' + photoId + '/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text }),
                    credentials: 'include'
                });
                setCommentInputs({ ...commentInputs, [photoId]: '' });
                fetchPhotos();
            };

            const sendChatMessage = async () => {
                if (!newMessage || newMessage.trim() === '') return;
                const tempMsg = newMessage;
                setNewMessage('');
                await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: tempMsg }),
                    credentials: 'include'
                });
                fetchMessages();
            };

            // Fonction Helper pour afficher un avatar
            const renderAvatar = (url, name, sizeClass = 'w-10 h-10', textSize = 'text-base') => {
                if (url && url !== '') {
                    return React.createElement('img', { src: url, className: `${sizeClass} rounded-full object-cover shadow-inner bg-slate-200 dark:bg-slate-700` });
                }
                return React.createElement('div', { className: `${sizeClass} rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 flex items-center justify-center text-white font-extrabold ${textSize} shadow-inner` },
                    (name || 'A')[0].toUpperCase()
                );
            };
            
            if (loading) {
                return React.createElement('div', { className: 'min-h-screen flex items-center justify-center dark:bg-slate-900' },
                    React.createElement('div', { className: 'w-10 h-10 border-4 border-purple-200 border-t-purple-600 rounded-full animate-spin' })
                );
            }
            
            // --- ECRAN DE CONNEXION ---
            if (!user) {
                return React.createElement('div', { className: 'min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-indigo-50 to-purple-100 dark:from-slate-900 dark:to-slate-800' },
                    React.createElement('div', { className: 'max-w-md w-full bg-white dark:bg-slate-800 rounded-3xl shadow-2xl p-8 border border-white/20 dark:border-slate-700' },
                        React.createElement('div', { className: 'text-center mb-8' },
                            React.createElement('div', { className: 'w-16 h-16 rounded-2xl bg-gradient-to-tr from-purple-600 to-indigo-600 flex items-center justify-center mx-auto mb-4 shadow-lg' },
                                React.createElement('svg', { className: 'w-8 h-8 text-white', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                    React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z' }),
                                    React.createElement('circle', { cx: '12', cy: '13', r: '3' })
                                )
                            ),
                            React.createElement('h1', { className: 'text-3xl font-extrabold text-slate-800 dark:text-white tracking-tight' }, 'SnapQuest'),
                            React.createElement('p', { className: 'text-slate-500 dark:text-slate-400 font-medium mt-1' }, isLogin ? 'Ravi de te revoir !' : 'Rejoins la communauté')
                        ),
                        React.createElement('div', { className: 'space-y-4' },
                            React.createElement('input', { type: 'text', placeholder: 'Nom d\'utilisateur', value: username, onChange: (e) => setUsername(e.target.value), className: 'w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all' }),
                            React.createElement('input', { type: 'password', placeholder: 'Mot de passe', value: password, onChange: (e) => setPassword(e.target.value), className: 'w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all' }),
                            !isLogin && React.createElement('input', { type: 'text', placeholder: 'Nom complet (optionnel)', value: fullName, onChange: (e) => setFullName(e.target.value), className: 'w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all' }),
                            React.createElement('button', { onClick: isLogin ? handleLogin : handleRegister, disabled: !username || !password || sending, className: `w-full py-3.5 rounded-xl font-bold transition-all shadow-md hover:shadow-lg ${!username || !password || sending ? 'bg-slate-200 dark:bg-slate-700 text-slate-400 dark:text-slate-500 cursor-not-allowed shadow-none' : 'bg-gradient-to-r from-purple-600 to-indigo-600 text-white hover:opacity-90'}` }, sending ? 'Chargement...' : (isLogin ? 'Se connecter' : 'Créer mon compte')),
                            React.createElement('button', { onClick: () => { setIsLogin(!isLogin); setError(''); setUsername(''); setPassword(''); }, className: 'w-full text-sm font-semibold text-purple-600 dark:text-purple-400 hover:text-purple-800 dark:hover:text-purple-300 transition-colors' }, isLogin ? 'Pas encore de compte ? S\'inscrire' : 'Déjà inscrit ? Se connecter'),
                            error && React.createElement('p', { className: 'text-red-500 text-sm text-center font-medium bg-red-50 dark:bg-red-900/30 p-2 rounded-lg' }, error)
                        )
                    )
                );
            }
            
            // --- APPLICATION PRINCIPALE ---
            return React.createElement('div', { className: 'min-h-screen flex flex-col' },
                // Header Global
                React.createElement('header', { className: 'sticky top-0 z-50 bg-white dark:bg-slate-800 shadow-sm border-b border-slate-100 dark:border-slate-700 transition-colors' },
                    React.createElement('div', { className: 'max-w-6xl mx-auto px-4 h-16 flex items-center justify-between' },
                        React.createElement('div', { className: 'flex items-center gap-2 cursor-pointer', onClick: () => setActiveTab('gallery') },
                            React.createElement('div', { className: 'w-9 h-9 rounded-xl bg-gradient-to-tr from-purple-600 to-indigo-600 flex items-center justify-center' },
                                React.createElement('svg', { className: 'w-5 h-5 text-white', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                    React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z' })
                                )
                            ),
                            React.createElement('span', { className: 'font-extrabold text-xl tracking-tight text-slate-800 dark:text-white hidden sm:block' }, 'SnapQuest')
                        ),
                        
                        // Menu de Navigation central
                        React.createElement('div', { className: 'flex items-center gap-1 sm:gap-4' },
                            React.createElement('button', { onClick: () => setActiveTab('gallery'), className: `p-3 rounded-xl transition-all flex items-center gap-2 ${activeTab === 'gallery' ? 'bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700'}` },
                                React.createElement('svg', { className: 'w-6 h-6', fill: activeTab === 'gallery' ? 'currentColor' : 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                    React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z' })
                                ),
                                React.createElement('span', { className: 'hidden md:block font-semibold text-sm' }, 'Actualités')
                            ),
                            React.createElement('button', { onClick: () => setActiveTab('upload'), className: `p-3 rounded-xl transition-all flex items-center gap-2 ${activeTab === 'upload' ? 'bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700'}` },
                                React.createElement('svg', { className: 'w-6 h-6', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                    React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M12 4v16m8-8H4' })
                                ),
                                React.createElement('span', { className: 'hidden md:block font-semibold text-sm' }, 'Publier')
                            ),
                            React.createElement('button', { onClick: () => setActiveTab('chat'), className: `p-3 rounded-xl transition-all flex items-center gap-2 ${activeTab === 'chat' ? 'bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700'}` },
                                React.createElement('svg', { className: 'w-6 h-6', fill: activeTab === 'chat' ? 'currentColor' : 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                    React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z' })
                                ),
                                React.createElement('span', { className: 'hidden md:block font-semibold text-sm' }, 'Discussions')
                            )
                        ),

                        // Actions rapides : Dark Mode, Profil, Logout
                        React.createElement('div', { className: 'flex items-center gap-2' },
                            // Bouton Dark Mode
                            React.createElement('button', { onClick: () => setDarkMode(!darkMode), className: 'w-10 h-10 rounded-full flex items-center justify-center text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors' },
                                darkMode 
                                ? React.createElement('svg', { className: 'w-5 h-5', fill: 'currentColor', viewBox: '0 0 20 20' }, React.createElement('path', { d: 'M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 4.22a1 1 0 011.415 0l.708.708a1 1 0 01-1.414 1.414l-.708-.708a1 1 0 010-1.414zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM14.925 15.632a1 1 0 010 1.414l-.708.708a1 1 0 11-1.414-1.414l.708-.708a1 1 0 011.414 0zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-4.22a1 1 0 010 1.415l-.708.708a1 1 0 11-1.414-1.414l.708-.708a1 1 0 011.414 0zM3 10a1 1 0 01-1 1H1a1 1 0 110-2h1a1 1 0 011 1zm2.075-4.368a1 1 0 010-1.414l.708-.708a1 1 0 111.414 1.414l-.708.708a1 1 0 01-1.414 0zM10 5a5 5 0 100 10 5 5 0 000-10z' }))
                                : React.createElement('svg', { className: 'w-5 h-5', fill: 'currentColor', viewBox: '0 0 20 20' }, React.createElement('path', { d: 'M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z' }))
                            ),
                            // Avatar Profil
                            React.createElement('div', { onClick: () => setActiveTab('profile'), className: 'cursor-pointer hover:opacity-80 transition-opacity' },
                                renderAvatar(user?.profile_pic, user?.full_name, 'w-9 h-9', 'text-sm')
                            ),
                            // Logout
                            React.createElement('button', { onClick: logout, className: 'w-10 h-10 rounded-full flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors', title: 'Déconnexion' },
                                React.createElement('svg', { className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                    React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1' })
                                )
                            )
                        )
                    )
                ),

                // Contenu Principal
                React.createElement('main', { className: 'flex-1 max-w-6xl mx-auto px-4 py-8 w-full' },
                    
                    // --- ONGLET : PROFIL ---
                    activeTab === 'profile' && React.createElement('div', { className: 'max-w-md mx-auto' },
                        React.createElement('div', { className: 'bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 p-8 text-center' },
                            React.createElement('h2', { className: 'text-2xl font-bold text-slate-800 dark:text-white mb-6' }, 'Mon Profil'),
                            
                            // Photo Picker
                            React.createElement('div', { className: 'relative inline-block mb-6 group' },
                                profilePicPreview 
                                    ? renderAvatar(profilePicPreview, user.full_name, 'w-24 h-24', 'text-3xl')
                                    : renderAvatar(user.profile_pic, user.full_name, 'w-24 h-24', 'text-3xl'),
                                React.createElement('div', { 
                                    onClick: () => document.getElementById('profile-file-input').click(), 
                                    className: 'absolute inset-0 bg-black/50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity' 
                                },
                                    React.createElement('svg', { className: 'w-8 h-8 text-white', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                        React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z' }),
                                        React.createElement('circle', { cx: '12', cy: '13', r: '3' })
                                    )
                                )
                            ),
                            React.createElement('input', { id: 'profile-file-input', type: 'file', accept: 'image/*', className: 'hidden', onChange: handleProfilePicChange }),
                            
                            // Champs Edition
                            React.createElement('div', { className: 'space-y-4 text-left' },
                                React.createElement('div', null,
                                    React.createElement('label', { className: 'text-sm font-bold text-slate-600 dark:text-slate-400 ml-1' }, 'Nom complet'),
